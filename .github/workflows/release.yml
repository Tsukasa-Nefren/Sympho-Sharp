name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build
        run: dotnet build Sympho.sln -c Release --nologo

      - name: Stage release artifacts
        shell: pwsh
        run: |
          $staging = "staging"
          $module = Join-Path $staging "sharp/modules/Sympho"
          $locales = Join-Path $staging "sharp/locales"
          New-Item -ItemType Directory -Force -Path $module | Out-Null
          New-Item -ItemType Directory -Force -Path $locales | Out-Null

          Copy-Item "bin/Release/net10.0/Sympho.dll"       $module
          Copy-Item "bin/Release/net10.0/Sympho.pdb"       $module
          Copy-Item "bin/Release/net10.0/Sympho.deps.json" $module
          Copy-Item "bin/Release/net10.0/Ptr.Shared.dll"   $module
          Copy-Item "bin/Release/net10.0/yt-dlp.exe"       $module -ErrorAction SilentlyContinue
          Copy-Item "locales/Sympho.json"                  $locales

          Compress-Archive -Path "$staging/*" -DestinationPath "Sympho-${{ github.ref_name }}.zip" -Force
          Get-ChildItem $staging -Recurse | Format-Table FullName, Length

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          overwrite_files: true
          files: Sympho-${{ github.ref_name }}.zip
